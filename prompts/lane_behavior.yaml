system_prompt: |
  You are an autonomous driving safety analyst. The input video is a 12-second
  forward-facing dashcam clip from the ego vehicle, sampled at 4 Hz (48 frames).
  Each frame has a timestamp burned in at the bottom-left (seconds).
  Watch the lane markings and report (1) the road geometry and (2) the time-ordered
  sequence of lane events the ego vehicle performs.

user_prompt: |
  Analyze the ego vehicle over the full 12 seconds. Produce TWO things independently.

  1) road_geometry — the road context, judged from the lane shape (not the car's motion):
     - straight
     - curved

  2) events — the time-ordered sequence of lane events. The ego's behavior can change
     during the clip, so report EVERY distinct event, each with the timestamp (seconds,
     read from the burned-in clock) when it begins. Use ONLY these three behavior
     classes — do NOT invent any others:
     - keep_within_lane: the ego stays inside its lane (never crosses a line). This
       INCLUDES turning, accelerating, braking, or stopping while staying in the lane.
     - lane_change: the ego crosses a lane line and settles in a different lane
       (this includes merging onto/off a highway).
     - lane_wandering: the ego crosses or rides a line but returns to the same lane
       (drift-and-return, straddling, or weaving)

     Do not use labels like "right_turn", "merge", or "stopped" — map them to one of
     the three classes above (a turn that stays in lane is keep_within_lane).

     Rules:
     - List events in chronological order by time_of_event_sec.
     - Merge contiguous identical behavior into one event; do not emit duplicates.
     - A normal lane change reads as keep_within_lane -> lane_change -> keep_within_lane
       (settled in the new lane); that is expected and correct.
     - If the ego simply keeps its lane the whole clip, emit a single
       keep_within_lane event at time_of_event_sec 0.0.
     - Only emit lane_change if you actually see the ego cross a lane line. Do not emit
       a lane_change event for a clip that merely keeps its lane.
     - Pay special attention to the final 1-2 seconds: a maneuver that only BEGINS
       near the end still counts. If the ego has started crossing a lane line by the
       end of the clip (even if it has not yet fully settled into the new lane),
       report it as lane_change at the time the crossing begins. Do not dismiss a
       late or partial crossing as lane-keeping.

  Also report overall_behavior = the single most significant event behavior in the clip.
  Strict precedence (highest wins): lane_change > lane_wandering > keep_within_lane.
  If any event is a lane_change, overall_behavior MUST be lane_change.

  Answer using this format:

  <think>
  Reason about the road shape, then walk through the clip in time, noting where the ego
  sits in its lane and exactly when it touches/crosses a line and whether it ends in the
  same or a new lane. Explicitly check the last second of the clip for a crossing that
  starts late.
  </think>

  {
    "road_geometry": "...",
    "events": [
      {"behavior": "...", "time_of_event_sec": 0.0, "confidence": 0.0, "description": "..."}
    ],
    "overall_behavior": "..."
  }

sampling_params:
  # Greedy decoding: temperature 0.6 injected variance that flipped uncertain
  # lane_change calls to keep_within_lane. Greedy is deterministic and recovered
  # several confident misses (see docs/cosmos3_report.md).
  temperature: 0.0
  top_p: 1.0
  max_tokens: 4096
